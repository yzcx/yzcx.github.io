<header class="header select-none">
  <img class="logo" src="{{ site.baseurl }}/static/img/logo.jpg" />
  <nav class="menu">
    {% for menu in site.menu -%}
    <a href="{{ site.baseurl }}{{ menu.url }}" class="hover-underline">{{ menu.title }}</a>
    {% endfor -%}
    
<head>
    <meta charset="UTF-8">
    <title>nav</title>
    <style>
    *{
        margin:0;padding:0;
    }
    .nav{
        list-style: none;
        width:700px;
        margin:40px auto;
        overflow: hidden;
        font-size: 20px;
    }
    .nav li{
        float:left;width:20%;    
    }
    .nav a{
        display:block;
        border-bottom: 3px solid #aaa;
        text-align: center;
        color:#000;padding:5px;
        text-decoration:none;font-weight: 400;
        font-family:Verdana, Arial, Helvetica, sans-serif;
    }
    .nav a:visited {
        color:#c00;border-bottom: 2px solid #d00;
    }
    .nav a:hover{
        background: #a00;color:#fff;
    }
    .nav a:active{
        color:#000;background: #d00;
    }
    </style>
</head>
<body>
    <ul class="nav">
        <li><a href="#" target="_blank"><br><span id="hitokoto">获取中...</span></br></a></li>

    </ul>
</body>

  
  </nav>
</header>
